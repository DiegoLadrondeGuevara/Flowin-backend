version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowin-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: flowindb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: flowin-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Sobrescribimos DB_URL para que apunte al contenedor de la bd en la red de Docker
      - DB_URL=jdbc:postgresql://db:5432/flowindb
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data:
